<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- External CSS -->
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <div class="header-left">
        <h1>Weather Analytics</h1>
        <form class="search" id="searchForm">

          <input class="search__input" type="text" id="searchInput" placeholder="Search for a place…" />
          <select id="unitSelect" class="btn btn--secondary">
            <option value="metric">°C</option>
            <option value="imperial">°F</option>
          </select>
          <select id="daysSelect" class="btn btn--secondary">
            <option value="1">1 day</option>
            <option value="2">2 days</option>
            <option value="3">3 days</option>
            <option value="4">4 days</option>
            <option value="5">5 days</option>
            <option value="6">6 days</option>
            <option value="7" selected>7 days</option>
          </select>
            <button class="btn btn--primary" onclick="window.location.href='ski_index.html'">
                ⛷ Ski Resort Analytics
            </button>
          <button class="btn btn--primary" type="submit">Search</button>
              <span class="compact-search-icon">🔍</span>
        </form>
      </div>
      <div class="theme-toggle" id="themeToggle"></div>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="loading" style="display: none;">
      <p>Loading weather data...</p>
    </div>

    <div id="error" class="error" style="display: none;">
      <p></p>
    </div>

    <section class="layout" id="weatherContent">
      <div class="left">
        <article class="current card">
          <div class="current__meta">
            <div class="current__meta-row">
              <h2 class="current__place" id="place">--</h2>
              <button id="saveFavoriteBtn" class="btn btn--secondary btn--small">★ Save</button>
            </div>
            <p class="current__date" id="date">--</p>
          </div>
          <div class="current__temp">
            <span class="current__icon" aria-hidden="true" id="currentIcon">☁️</span>
            <span class="current__value" id="currentTemp">--°</span>
          </div>
        </article>

        <section class="stats">
          <div class="stat card">
            <p class="stat__label">Feels Like</p>
            <p class="stat__value" id="feelsLike">--°</p>
          </div>
          <div class="stat card">
            <p class="stat__label">Humidity</p>
            <p class="stat__value" id="humidity">--%</p>
          </div>
          <div class="stat card">
            <p class="stat__label">Wind</p>
            <p class="stat__value" id="wind">--</p>
          </div>
          <div class="stat card">
            <p class="stat__label">Precipitation</p>
            <p class="stat__value" id="precip">--</p>
          </div>
        </section>
        <section class="daily card">
          <h3 class="section-title">Daily Forecast</h3>
          <ul class="daily__list" id="dailyList"></ul>
        </section>
      </div>

      <aside class="right">
        <div class="panel card">
          <div class="panel__head">
            <h3>Favorites</h3>
          </div>
          <ul id="favoritesList" class="favorites"></ul>
        </div>
        <div class="panel card">
          <div class="panel__head">
            <h3>Hourly Forecast</h3>
          </div>
          <ul class="hourly" id="hourlyList"></ul>
        </div>
      </aside>
        <section class="panel card">
              <div class="panel__head">
                  <h3>Local News Videos</h3>
              </div>
              <ul id="videosList" class="videos"></ul>
          </section>
    </section>

  </main>

  <footer class="site-footer">
    <small>Built by Mr.Baratov</small>
  </footer>

  <!-- External JS -->
<!--  src="../js/app.js"-->
  <script src="/env.js"></script>
  <script >
      // const API_BASE_URL = 'https://api.weatherdemo.online/api/weather';
const DEFAULT_LOCAL_API_BASE_URL = 'http://localhost:8000/api/weather';
const DEFAULT_PROD_API_BASE_URL = 'https://app-weather-analytics-api-wus2.azurewebsites.net/api/weather';

const API_BASE_URL =
  (window.__ENV__ && window.__ENV__.API_BASE_URL)
    ? window.__ENV__.API_BASE_URL
    : ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? DEFAULT_LOCAL_API_BASE_URL
        : DEFAULT_PROD_API_BASE_URL);
const header = document.querySelector('.site-header');
const compactSearchIcon = document.querySelector('.compact-search-icon');
const unitSelect = document.getElementById('unitSelect');
const searchForm = document.getElementById('searchForm');
const searchInput = document.getElementById('searchInput');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');
const weatherContent = document.getElementById('weatherContent');
const favoritesList = document.getElementById('favoritesList');
const saveFavoriteBtn = document.getElementById('saveFavoriteBtn');
const themeToggle = document.getElementById('themeToggle');
const daysSelect = document.getElementById('daysSelect');

let currentPlace = null;

unitSelect.value = localStorage.getItem('unit') || 'metric';
unitSelect.addEventListener('change', () => {
    localStorage.setItem('unit', unitSelect.value);
    loadWeather(searchInput.value.trim());
})
//       NEW START
let headerIsCompact = false;

// Smooth, no-blink scroll behavior with hysteresis
window.addEventListener('scroll', () => {
  const y = window.scrollY;

  // Shrink once we’re clearly scrolled down
  if (!headerIsCompact && y > 80) {
    header.classList.add('site-header--compact');
    headerIsCompact = true;
  }
  // Expand only when we come almost all the way back up
  else if (headerIsCompact && y < 20) {
    header.classList.remove('site-header--compact');
    headerIsCompact = false;
  }
});

// Scroll to top + focus search when tapping the icon
if (compactSearchIcon) {
  compactSearchIcon.addEventListener('click', () => {
    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });

    // Let scroll handler remove compact class once we're at the top,
    // but we can also force it right away for snappier feel:
    header.classList.remove('site-header--compact');
    headerIsCompact = false;

    setTimeout(() => {
      const input = document.getElementById('searchInput');
      if (input) input.focus();
    }, 300);
  });
}

// Theme Management
function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
}

themeToggle.addEventListener('click', () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
});

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  loadWeather();
  loadFavorites();

  searchForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = searchInput.value.trim();
    if (query) {
      loadWeather(query);
    } else {
      loadWeather();
    }
  });

  saveFavoriteBtn.addEventListener('click', async () => {
    try {
      const q = (searchInput.value && searchInput.value.trim()) || currentPlace;
      if (!q) return;
      const res = await fetch(`${API_BASE_URL}/favorites`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q })
      });
      if (!res.ok) throw new Error('Failed to save favorite');
      await loadFavorites();
    } catch (err) {
      console.error(err);
      showError('Could not save favorite');
    }
  });
});

//       NEW END

async function loadWeather(query = null, lat = null, lon = null) {
  showLoading();
  hideError();

  try {
    let url = `${API_BASE_URL}/summary`;
    const params = new URLSearchParams();

    if (daysSelect && daysSelect.value) {
      params.append('days', daysSelect.value);
    }
    params.append('units', unitSelect.value || 'metric');

    if (query) {
      params.append('q', query);
    } else if (lat && lon) {
      params.append('lat', lat);
      params.append('lon', lon);
    }

    if (params.toString()) {
      url += `?${params.toString()}`;
    }

    const response = await fetch(url);

    if (!response.ok) {
      throw new Error(`Failed to fetch weather data: ${response.statusText}`);
    }

    const data = await response.json();
    renderWeather(data);
    hideLoading();

  } catch (error) {
    console.error('Error loading weather:', error);
    showError(error.message);
    hideLoading();
  }
}

function renderWeather(data) {
    const unitSymbol = unitSelect.value === 'imperial' ? '°F' : '°C';
    currentPlace = data.place || 'Unknown';
    document.getElementById('place').textContent = currentPlace;
    document.getElementById('date').textContent = data.date || '--';
    document.getElementById('currentIcon').textContent = data.current?.icon || '☁️';
    document.getElementById('currentTemp').textContent = `${data.current?.temp || '--'}${unitSymbol}`;
    document.getElementById('feelsLike').textContent = `${data.current?.feels_like || '--'}${unitSymbol}`;
    document.getElementById('humidity').textContent = `${data.current?.humidity || '--'}%`;
    document.getElementById('wind').textContent = data.current?.wind || '--';
    document.getElementById('precip').textContent = data.current?.precip || '--';

  const dailyList = document.getElementById('dailyList');
  dailyList.innerHTML = '';

  if (data.daily && Array.isArray(data.daily)) {
    data.daily.forEach(day => {
      const li = document.createElement('li');
      li.className = 'day';
      li.innerHTML = `
        <p class="day__name">${day.name}</p>
        <span class="day__icon" aria-hidden="true">${day.icon}</span>
        <p class="day__temps"><strong>${day.hi}°</strong><span>${day.lo}°</span></p>
      `;
      dailyList.appendChild(li);
    });
  }

  const hourlyList = document.getElementById('hourlyList');
  hourlyList.innerHTML = '';

  if (data.hourly && Array.isArray(data.hourly)) {
    data.hourly.forEach(hour => {
      const li = document.createElement('li');
      li.className = 'hour';
      li.innerHTML = `
        <span class="hour__time">${hour.time}</span>
        <span class="hour__icon" aria-hidden="true">${hour.icon}</span>
        <span class="hour__temp">${hour.temp}°</span>
      `;
      hourlyList.appendChild(li);
    });
  }

  // Render YouTube videos
  const videosList = document.getElementById('videosList');
  if (videosList) {
    videosList.innerHTML = '';

    if (data.videos && Array.isArray(data.videos) && data.videos.length > 0) {
      data.videos.forEach(video => {
        const li = document.createElement('li');
        li.className = 'video-card';

        const publishedDate = video.published_at
          ? new Date(video.published_at).toLocaleDateString()
          : 'Unknown date';

        li.innerHTML = `
          ${video.thumbnail_url ? `<img src="${video.thumbnail_url}" alt="${video.title}" class="video-card__thumbnail">` : ''}
          <div class="video-card__content">
            <h4 class="video-card__title">${video.title || 'Untitled Video'}</h4>
            <div class="video-card__meta">
              <span class="video-card__channel">${video.channel_title || 'Unknown Channel'}</span>
              <span class="video-card__date">${publishedDate}</span>
            </div>
            <a href="${video.url}" target="_blank" rel="noopener noreferrer" class="video-card__link">
              ▶ Watch on YouTube
            </a>
          </div>
        `;
        videosList.appendChild(li);
      });
    } else {
      const li = document.createElement('li');
      li.className = 'videos__empty';
      li.textContent = 'No local news videos available';
      videosList.appendChild(li);
    }
  }

  weatherContent.style.display = 'block';
}

async function loadFavorites() {
  try {
    const res = await fetch(`${API_BASE_URL}/favorites`);
    if (!res.ok) throw new Error('Failed to load favorites');
    const items = await res.json();
    renderFavorites(items);
  } catch (err) {
    console.error(err);
  }
}

function renderFavorites(items) {
  favoritesList.innerHTML = '';
  if (!items || !items.length) {
    const li = document.createElement('li');
    li.className = 'favorites__empty';
    li.textContent = 'No favorites yet';
    favoritesList.appendChild(li);
    return;
  }
  items.forEach(it => {
    const li = document.createElement('li');
    li.className = 'favorites__item';
    const name = it.place || it.location_id;
    li.innerHTML = `
      <span class="favorites__name">${name}</span>
      <div class="favorites__actions">
        <button class="btn btn--small btn--secondary" data-action="view" data-lat="${it.latitude}" data-lon="${it.longitude}">View</button>
        <button class="btn btn--small btn--danger" data-action="delete" data-id="${it.id}">Delete</button>
      </div>
    `;
    favoritesList.appendChild(li);
  });

  favoritesList.querySelectorAll('button').forEach(btn => {
    const action = btn.getAttribute('data-action');
    if (action === 'view') {
      btn.addEventListener('click', () => {
        const lat = parseFloat(btn.getAttribute('data-lat'));
        const lon = parseFloat(btn.getAttribute('data-lon'));
        loadWeather(null, lat, lon);
      });
    } else if (action === 'delete') {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        await deleteFavorite(id);
        await loadFavorites();
      });
    }
  });
}

async function deleteFavorite(id) {
  try {
    const res = await fetch(`${API_BASE_URL}/favorites/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed to delete favorite');
  } catch (err) {
    console.error(err);
    showError('Could not delete favorite');
  }
}

function showLoading() {
  loadingEl.style.display = 'block';
  weatherContent.style.display = 'none';
}

function hideLoading() {
  loadingEl.style.display = 'none';
}

function showError(message) {
  errorEl.querySelector('p').textContent = `Error: ${message}`;
  errorEl.style.display = 'block';
  weatherContent.style.display = 'none';
}

function hideError() {
  errorEl.style.display = 'none';
}
  </script>
</body>
</html>
